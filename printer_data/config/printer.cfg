[include fluidd.cfg]
[include shell_command.cfg]
[include adxl.cfg]

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

#[mcu]
#serial: /dev/serial/by-id/usb-Klipper_stm32f407xx_370027000D47393438343535-if00
[mcu]
serial: /dev/serial0
baud: 250000
restart_method: command

[mcu host]
serial: /tmp/klipper_host_mcu
	
#[mcu adxl]
#serial: /dev/serial/by-id/usb-Klipper_rp2040_E6647C74036C5C37-if00
### 查询usb固件id是:ls -l /dev/serial/by-id/
### 把/dev/serial/by-id/usb-Klipper_rp2040_XXXXXXXXXXXXXXXXXXXXX替换查询到的id

##ADXL345加速度计
#[adxl345]
#cs_pin: adxl:gpio9
#spi_software_sclk_pin: adxl:gpio10
#spi_software_mosi_pin: adxl:gpio11
#spi_software_miso_pin: adxl:gpio12

#[resonance_tester]
#accel_chip: adxl345
#probe_points:
#    117.5, 117.5, 10

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[stepper_x]
step_pin: PE3
dir_pin: !PE2
enable_pin: !PE5
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop   # PA2
position_endstop: -10
position_min: -10
position_max: 258
homing_speed: 20
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PE4
run_current: 0.800
hold_current: 0.400
stealthchop_threshold: 999999
interpolate: True
sense_resistor: 0.110
diag_pin: PA2          # зависит от платы
driver_SGTHRS: 49       # чувствительность (подбирается!)(homing_speed: 20, run_current: 0.800, driver_SGTHRS: от 44 до 54)

[stepper_y]
step_pin: PB9
dir_pin: !PB8
enable_pin: !PE1
microsteps: 16
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop  # PB10
position_endstop: -24
position_min: -24
position_max: 210
homing_speed: 20
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PE0
run_current: 0.800
hold_current: 0.400
stealthchop_threshold: 999999
interpolate: True
sense_resistor: 0.110
diag_pin: PB10          # зависит от платы
driver_SGTHRS: 55       # чувствительность (подбирается!)(homing_speed: 20, run_current: 0.800, driver_SGTHRS: от 48 до 62)

[stepper_z]
step_pin: PB3
dir_pin: PD7
enable_pin: !PB5
microsteps: 16
step_pulse_duration: 0.0000004
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
#position_endstop: 0
position_min: -5
position_max: 230

[tmc2209 stepper_z]
uart_pin: PB4
run_current: 0.800
hold_current: 0.400
stealthchop_threshold: 999999
interpolate: True
sense_resistor: 0.110

[stepper_z1]
step_pin: PC13
dir_pin: PC0
enable_pin: !PC15
microsteps: 16
rotation_distance: 8

[tmc2209 stepper_z1]
uart_pin: PC14
run_current: 0.800
hold_current: 0.400
stealthchop_threshold: 999999
interpolate: True
sense_resistor: 0.110

[extruder]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 16
##gear_ratio: 5:1
## Steps per mm: 679
## Rotation Degrees: 1.8
## Full Steps Per Rotation: 200
## Rotation_distance = <full_steps_per_rotation> * <microsteps> / <steps_per_mm> 200*16/706.5=4.52 from reprap 
## 4.712812960235641 = 200 * 16 / 679
rotation_distance: 4.52 # 4.46   
max_extrude_only_distance: 120.0
max_extrude_only_velocity: 80.0
max_extrude_only_accel: 800.0
nozzle_diameter: 0.400
filament_diameter: 1.750
pressure_advance: 0.00
pressure_advance_smooth_time: 0.040
heater_pin: PA5
sensor_pin: PA4
sensor_type: ATC Semitec 104GT-2
control = pid  # 250C
pid_kp = 29.494
pid_ki = 1.695
pid_kd = 128.297
min_temp: 5
max_temp: 300
min_extrude_temp: 180

[tmc2209 extruder]
uart_pin: PD5
run_current: 0.800
hold_current: 0.400
stealthchop_threshold: 0
interpolate: True
sense_resistor: 0.110

[verify_heater extruder]
max_error: 60
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[heater_bed]
heater_pin: PC6
sensor_pin: PA3
sensor_type: EPCOS 100K B57560G104F
control = pid   # 100C
pid_kp = 72.440
pid_ki = 1.345
pid_kd = 975.218
min_temp: 0
max_temp: 120

[verify_heater heater_bed]
max_error: 100
check_gain_time: 45
hysteresis: 5
heating_gain: 2

[fan]  # обдув детали
pin: PA7
#cycle_time: 0.50

[heater_fan hotend_fan]
pin: PA6
heater: extruder
heater_temp: 50
fan_speed: 1.0

[controller_fan mainboard_fan]
pin: PB7
#stepper: stepper_x, stepper_y, stepper_z
heater: extruder
fan_speed: 1.0
idle_timeout: 60

[fan_generic case_light]
pin: PB6
max_power: 1.0
cycle_time: 0.001
shutdown_speed: 0

[temperature_sensor E3-PRO-MCU]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 100

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[bltouch]
sensor_pin: ^PC5
control_pin: PB0
stow_on_each_sample: False
x_offset: -38
y_offset: 18
z_offset: 2.85
speed: 5
lift_speed: 10
samples: 2
samples_result: median
samples_tolerance: 0.01
samples_tolerance_retries: 3
sample_retract_dist: 2.5

[safe_z_home]
home_xy_position: 155, 99
speed: 80
z_hop: 10
z_hop_speed: 5

[bed_mesh]
mesh_min: 15, 10
mesh_max: 220, 225
probe_count: 7, 7
speed: 120
horizontal_move_z: 5
algorithm: bicubic

[z_tilt]
z_positions:
    -27, 117.5
    262, 117.5

points:
    58, 99
    253, 99

speed: 120
horizontal_move_z: 10
retries: 3
retry_tolerance: 0.02

[screws_tilt_adjust]
screw1: 70, 14
screw1_name: front_left

screw2: 241, 14
screw2_name: front_right

screw3: 241, 185
screw3_name: rear_right

screw4: 70, 185
screw4_name: rear_left

speed: 50
horizontal_move_z: 5
screw_thread: CW-M4

[force_move] 
enable_force_move: true 

[exclude_object]

[firmware_retraction]
retract_length: 0.5
retract_speed: 30
unretract_extra_length: 0
unretract_speed: 35

[respond]

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE12, EXP1_3=PE10,  EXP1_5=PE9,   EXP1_7=PE7,  EXP1_9=<GND>,
    EXP1_2=PE11, EXP1_4=<RST>, EXP1_6=PE8,   EXP1_8=PB1,  EXP1_10=<5V>

# See the sample-lcd.cfg file for definitions of common LCD displays.

[gcode_macro LOAD_FILAMENT]
variable_load_distance: 20         # Distance to load filament into the extruder
variable_purge_distance: 100        # Distance to purge filament after loading
variable_nozzle_preheat_temp: 230  # Default preheat temperature for the nozzle
variable_turn_off_extruder: True   # Option to turn off the extruder after loading (True/False)
gcode:
    # Parameters and settings
    {% set load_speed = params.LOAD_SPEED|default(600) %}  # Speed in mm/min for fast filament loading
    {% set purge_speed = params.PURGE_SPEED|default(300) %}  # Speed in mm/min for purging filament
    {% set target_temp = params.TARGET_TEMP|default(nozzle_preheat_temp) %}  # Target temperature for the nozzle
    {% set min_temp = params.MIN_TEMP|default(180) %}  # Minimum safe temperature for extrusion

    # Save current state of the printer
    SAVE_GCODE_STATE NAME=load_state

    # Heat directly to the target temperature if it's above the minimum temperature
    {% if target_temp >= min_temp %}
        M104 S{target_temp} ; Set extruder to target temperature
        M109 S{target_temp} ; Wait for extruder to reach target temperature
    {% else %}
        # Heat to minimum temperature first if target is too low
        M104 S{min_temp} ; Set extruder to safe minimum temperature
        M109 S{min_temp} ; Wait for extruder to reach safe minimum temperature
    {% endif %}

    # Begin filament loading process
    G91 ; Set relative positioning for extrusion
    G92 E0 ; Reset extruder position
    G1 E{load_distance} F{load_speed} ; Load filament at the specified loading speed
    G1 E{purge_distance} F{purge_speed} ; Purge filament at the slower purging speed
    G4 P1000 ; Wait one second
    G1 E-2 F1800 ; Retract 2mm of filament at 1800mm/min
    M400 ; Wait for moves to complete

    # Optionally turn off the extruder heater after loading
    {% if turn_off_extruder %}
        M104 S0 ; Turn off extruder heater
    {% endif %}

    # Restore previous state of the printer
    G90 ; Restore absolute positioning
    RESTORE_GCODE_STATE NAME=load_state

    # Completion message
    M117 Filament load complete

[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance: 60      # Distance to retract filament from the extruder
variable_nozzle_preheat_temp: 180  # Default preheat temperature for unloading
variable_turn_off_extruder: True   # Option to turn off the extruder after unloading (True/False)
gcode:
    # Parameters and settings
    {% set retract_speed = params.RETRACT_SPEED|default(600) %}  # Speed for retracting filament
    {% set target_temp = params.TARGET_TEMP|default(nozzle_preheat_temp) %}  # Target temperature for the nozzle
    {% set min_temp = params.MIN_TEMP|default(180) %}  # Minimum safe temperature for extrusion

    # Save current state of the printer
    SAVE_GCODE_STATE NAME=unload_state

    # Heat the nozzle to the target temperature if required
    {% if printer.extruder.temperature < target_temp %}
        # Ensure the nozzle is heated to the target temperature or at least the minimum safe temperature
        {% if target_temp >= min_temp %}
            M104 S{target_temp} ; Set extruder to target temperature
            M109 S{target_temp} ; Wait for extruder to reach target temperature
        {% else %}
            M104 S{min_temp} ; Set extruder to safe minimum temperature
            M109 S{min_temp} ; Wait for extruder to reach safe minimum temperature
        {% endif %}
    {% endif %}

    # Begin filament unloading process
    G91 ; Set relative positioning for extrusion
    G92 E0 ; Reset extruder position
    G1 E-{unload_distance} F{retract_speed} ; Retract filament at the specified speed
    M400 ; Wait for moves to complete

    # Optionally turn off the extruder heater after unloading
    {% if turn_off_extruder %}
        M104 S0 ; Turn off extruder heater
    {% endif %}

    # Restore previous state of the printer
    G90 ; Restore absolute positioning
    RESTORE_GCODE_STATE NAME=unload_state

    # Completion message
    M117 Filament unload complete

[gcode_macro START_PRINT]
description: Старт печати (нагрев + подготовка)
gcode:
    {% set BED_TEMPERATURE = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMPERATURE = params.EXTRUDER_TEMP|default(190)|float %}
    ...

    M117 Heating bed...
    M140 S{BED_TEMPERATURE}
    M104 S150                     ; слегка греем сопло (анти-сопли)

    G90
    G28                           ; home

    {% if printer.configfile.settings.z_tilt is defined %}
        M117 Z tilt adjust...
        Z_TILT_ADJUST
    {% endif %}

    M117 Loading mesh...
    BED_MESH_PROFILE LOAD=default

    M117 Heating nozzle...
    M190 S{BED_TEMPERATURE}                   ; ждём стол
    M109 S{EXTRUDER_TEMPERATURE}              ; ждём сопло

    M117 Prime line...
    G92 E0  ; Reset Extruder
    G1 Z2.0 F3000 ; Move Z Axis up little to prevent scratching of Heat Bed
    G1 X5 Y10 F5000  ; Move to start position
    G1 Z0.2  ; Move down
    G1 X220 E20 F1200             ; Draw the first line
    G1 X220 Y10.2 F5000     ; Move to side a little
    G1 X5 E20 F1200              ; Draw the second line
    G92 E0   ; Reset Extruder
    G1 Z2.0 F3000 ; Move Z Axis up little to prevent scratching of Heat Bed
    G1 X5 Y20 Z0.2 F5000.0 ; Move over to prevent blob squish
    M117 Printing...
### Надо прописать в орке Start G-code:
### START_PRINT BED_TEMP={bed_temperature_initial_layer[current_extruder]} EXTRUDER_TEMP={nozzle_temperature_initial_layer[current_extruder]}
### TEST
### START_PRINT BED_TEMP=105 EXTRUDER_TEMP=270

[gcode_macro END_PRINT]
description: Завершение печати
gcode:
    M117 Finishing...
    G91   ;Relative positioning
    G1 X-2 Y-2 E-3 F300           ; ретракт
    G1 Z10 F300                   ; поднять сопло
    G90
    G1 X0 Y220 F5000              ; увести голову
    M104 S0                       ; выкл хотенд
    M140 S0                       ; выкл стол
    M106 S0                       ; выкл обдув
    M84                           ; моторы выкл
    M117 Done

### Надо прописать в орке Start G-code:
### END_PRINT

[pause_resume]
recover_velocity: 50


[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    # Parameters
    {% set z = params.Z|default(10)|int %}                                                   ; z hop amount

    {% if printer['pause_resume'].is_paused|int == 0 %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}                              ; set z hop variable for reference in resume macro
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target}    ; set hotend temp variable for reference in resume macro

        #SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0                                  ; disable filament sensor
        SAVE_GCODE_STATE NAME=PAUSE                                                          ; save current print position for resume
        BASE_PAUSE                                                                           ; pause print
        {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}       ; check that zhop doesn't exceed z max
            G91                                                                              ; relative positioning
            G1 Z{z} F900                                                                     ; raise Z up by z hop amount
        {% else %}
            { action_respond_info("Pause zhop exceeds maximum Z height.") }                  ; if z max is exceeded, show message and set zhop value for resume to 0
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
        {% endif %}
        G90                                                                                  ; absolute positioning
        G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} F6000   ; park toolhead at front center
        SAVE_GCODE_STATE NAME=PAUSEPARK                                                      ; save parked position in case toolhead is moved during the pause (otherwise the return zhop can error)
        M104 S0                                                                              ; turn off hotend
        SET_IDLE_TIMEOUT TIMEOUT=43200                                                       ; set timeout to 12 hours
    {% endif %}


[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
gcode:
    # Parameters
    {% set e = params.E|default(2.5)|int %}                                          ; hotend prime amount (in mm)

    {% if printer['pause_resume'].is_paused|int == 1 %}
        #SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1                          ; enable filament sensor
        #INITIAL_RGB                                                                    ; reset LCD color
        SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}  ; set timeout back to configured value
        {% if etemp > 0 %}
            M109 S{etemp|int}                                                        ; wait for hotend to heat back up
        {% endif %}
        RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=100                     ; go back to parked position in case toolhead was moved during pause (otherwise the return zhop can error)
        G91                                                                          ; relative positioning
        M83                                                                          ; relative extruder positioning
        {% if printer[printer.toolhead.extruder].temperature >= printer.configfile.settings.extruder.min_extrude_temp %}
            G1 Z{zhop * -1} E{e} F900                                                ; prime nozzle by E, lower Z back down
        {% else %}
            G1 Z{zhop * -1} F900                                                     ; lower Z back down without priming (just in case we are testing the macro with cold hotend)
        {% endif %}
        RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=60                          ; restore position
        BASE_RESUME                                                                  ; resume print
    {% endif %}


[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout} ; set timeout back to configured value
    CLEAR_PAUSE
    SDCARD_RESET_FILE
    PRINT_END
    BASE_CANCEL_PRINT


[gcode_macro LIGHT_ON]
gcode:
    SET_FAN_SPEED FAN=case_light SPEED=1.0

[gcode_macro LIGHT_OFF]
gcode:
    SET_FAN_SPEED FAN=case_light SPEED=0.0

[gcode_macro NIGHT_LIGHT]
gcode:
    SET_FAN_SPEED FAN=case_light SPEED=0.15

[idle_timeout]
timeout: 1800
gcode:
    LIGHT_OFF

[gcode_macro UNSAFE_RAISE_TOOL]
gcode:
    G90
    SET_KINEMATIC_POSITION Z=0
    G0 Z10 F600
    M84

[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True

[gcode_macro move_tool_to_center]
gcode:
    G0 Z5 F600
    G0 X117 Y117 F600
    

